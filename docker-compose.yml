version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_DB: studyroom_db
      POSTGRES_USER: studyroom_user
      POSTGRES_PASSWORD: studyroom_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: spring-studyroom
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/studyroom_db
      SPRING_DATASOURCE_USERNAME: studyroom_user
      SPRING_DATASOURCE_PASSWORD: studyroom_pass
      JWT_SECRET: 65yo64GI7ZWc6rWt67Cl7ZWc7IKs67Cc7ZWY6rOg7Iu264uk
    restart: always

volumes:
  pgdata:
